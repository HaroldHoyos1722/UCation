<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-frame" (click)="$event.stopPropagation()">
    <div class="modal-container">

      <button class="close-btn" (click)="close()">✕</button>

    <!-- Step: enter email -->
    <ng-container *ngIf="step === 'email'">
      <h2>Restablecer contraseña</h2>
      <p>Ingresa tu correo institucional.</p>

      <input
        type="email"
        [(ngModel)]="email"
        placeholder="usuario@universidad.edu.co"
      />

      <button (click)="sendRecoveryEmail()" [disabled]="loading || !email">
        {{ loading ? 'Enviando...' : 'Enviar código' }}
      </button>

      <p class="error" *ngIf="error">{{ error }}</p>
    </ng-container>

    <!-- Step: verify code -->
    <ng-container *ngIf="step === 'verify'">
      <h2>Verificar código</h2>
      <p>Hemos enviado un código a <strong>{{ email }}</strong>. Ingresa el código recibido.</p>

      <input type="text" [(ngModel)]="code" placeholder="Código de 6 dígitos" />

      <button (click)="verifyRecoveryCode()" [disabled]="loading || !code">
        {{ loading ? 'Verificando...' : 'Verificar código' }}
      </button>

      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn-outline" (click)="step='email'">Cambiar correo</button>
        <button class="btn-outline" (click)="sendRecoveryEmail()" [disabled]="loading">Reenviar código</button>
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>
    </ng-container>

    <!-- Step: reset password -->
    <ng-container *ngIf="step === 'reset'">
      <h2>Nueva contraseña</h2>
      <p>Ingresa la nueva contraseña para <strong>{{ email }}</strong>.</p>

      <input type="password" [(ngModel)]="newPassword" placeholder="Nueva contraseña" />
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirmar contraseña" />

      <button (click)="submitNewPassword()" [disabled]="loading">
        {{ loading ? 'Restableciendo...' : 'Restablecer contraseña' }}
      </button>

      <p class="error" *ngIf="error">{{ error }}</p>
    </ng-container>

    </div>
  </div>
</div>
